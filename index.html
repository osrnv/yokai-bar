<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Бар «Ёкай»</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍶</text></svg>">
</head>
<body>

    <!-- ===== ЭКРАН 1: ПРИВЕТСТВИЕ ===== -->
    <div id="screen-welcome" class="screen active">
        <div class="welcome-container">
            <button class="btn btn-enter" onclick="goToScreen('screen-barman')">Войти</button>
        </div>
    </div>

    <!-- ===== ЭКРАН 2: ЗНАКОМСТВО С БАРМЕНОМ ===== -->
    <div id="screen-barman" class="screen">
        <div class="barman-container">
            <div class="barman-portrait">🧑‍🍳</div>
            <div class="dialogue-box">
                <p class="barman-name">Бармен</p>
                <div id="barman-text" class="barman-text"></div>
            </div>
            <button id="btn-accept" class="btn btn-accept" onclick="acceptChallenge()">
                Принять вызов
            </button>
        </div>
    </div>

    <!-- ===== ЭКРАН 3: ИГРОВОЙ ПРОЦЕСС ===== -->
    <div id="screen-game" class="screen">
        <div class="game-container">

            <!-- Счётчик попыток -->
            <div class="game-header">
                <div class="attempt-counter">
                    Попытка <span id="current-attempt">1</span> из 9
                </div>
            </div>

            <!-- История попыток -->
            <div id="history" class="history-board"></div>

            <!-- Текущая попытка -->
            <div class="current-section">
                <div id="current-slots" class="current-slots"></div>
            </div>

            <!-- Палитра ингредиентов -->
            <div id="palette" class="ingredient-palette"></div>

            <!-- Кнопка подтверждения -->
            <button id="btn-confirm" class="btn btn-confirm" disabled onclick="submitGuess()">
                Проверить
            </button>

        </div>
    </div>

    <!-- ===== ЭКРАН 4: ПОБЕДА ===== -->
    <div id="screen-win" class="screen">
        <div class="result-container win-container">
            <div class="barman-portrait">🧑‍🍳</div>
            <div class="barman-reaction">«Безупречно. Ты чувствуешь вкус так же, как я.»</div>

            <div class="cocktail-card">
                <div class="cocktail-emoji" id="win-emoji">🍸</div>
                <h2 id="win-name" class="cocktail-name"></h2>
                <div id="win-recipe" class="cocktail-recipe"></div>
                <p id="win-legend" class="cocktail-legend"></p>
            </div>

            <div id="win-stats" class="result-stats"></div>

            <button class="btn btn-next" onclick="nextCocktail()">
                Ещё коктейль
            </button>
        </div>
    </div>

    <!-- ===== ЭКРАН 5: ПОРАЖЕНИЕ ===== -->
    <div id="screen-lose" class="screen">
        <div class="result-container lose-container">
            <div class="barman-portrait barman-turned">🧑‍🍳</div>
            <div class="barman-reaction">«Не каждый способен понять этот бар. Может, в следующий раз.»</div>

            <div class="cocktail-card card-dark">
                <p class="reveal-label">Правильный рецепт:</p>
                <h2 id="lose-name" class="cocktail-name"></h2>
                <div id="lose-recipe" class="cocktail-recipe"></div>
            </div>

            <button class="btn btn-retry" onclick="retryCocktail()">
                Попробовать снова
            </button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
