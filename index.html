<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Бар «Ёкай»</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍶</text></svg>">
</head>
<body>

    <!-- ===== ЭКРАН 1: ПРИВЕТСТВИЕ ===== -->
    <div id="screen-welcome" class="screen active">
        <div class="welcome-container">
            <button class="btn btn-enter" onclick="goToScreen('screen-barman')">Войти</button>
        </div>
    </div>

    <!-- ===== ЭКРАН 2: ЗНАКОМСТВО С БАРМЕНОМ ===== -->
    <div id="screen-barman" class="screen">
        <div class="barman-illustration">
            <img id="barman-img-1" class="barman-img barman-img--active" src="assets/backgrounds/barmen pose 1.png" alt="Бармен">
            <img id="barman-img-2" class="barman-img" src="assets/backgrounds/barmen pose 2.png" alt="Бармен">
        </div>
        <div class="barman-overlay">
            <div class="dialogue-box">
                <p class="barman-name">Бармен</p>
                <div id="barman-text" class="barman-text"></div>
            </div>
            <button id="btn-barman-next" class="btn btn-accept visible" onclick="advanceBarmanDialogue()">Дальше</button>
        </div>
    </div>

    <!-- ===== ЭКРАН 3: ИГРОВОЙ ПРОЦЕСС ===== -->
    <div id="screen-game" class="screen">
        <div class="game-container">

            <!-- Счётчик попыток -->
            <div class="game-header">
                <div class="attempt-counter">
                    Попытка <span id="current-attempt">1</span> из 9
                </div>
            </div>

            <!-- История попыток и текущая попытка (последний ряд) -->
            <div id="history" class="history-board"></div>

            <!-- Палитра ингредиентов -->
            <div id="palette" class="ingredient-palette"></div>

            <!-- Кнопка подтверждения -->
            <button id="btn-confirm" class="btn btn-confirm" disabled onclick="submitGuess()">
                Проверить
            </button>

        </div>
    </div>

    <!-- ===== ЭКРАН 4: ПОБЕДА ===== -->
    <div id="screen-win" class="screen">
        <div class="result-container">
            <div id="win-stats" class="result-stats"></div>

            <div class="win-dialogue">
                <img
                    id="win-barman-thumb"
                    class="win-barman-thumb"
                    src="assets/barmen win.png"
                    alt="Бармен"
                >
                <div id="win-reaction" class="barman-reaction">Безупречно! Ты чувствуешь вкус так же, как я!</div>
            </div>

            <div class="cocktail-image-frame">
                <img
                    id="win-image"
                    class="cocktail-image"
                    src="assets/placeholder.svg"
                    alt="Коктейль"
                >
            </div>

            <h2 id="win-name" class="cocktail-name"></h2>
            <p id="win-legend" class="cocktail-legend"></p>

            <div id="win-recipe" class="cocktail-ingredients" aria-label="Ингредиенты коктейля"></div>

            <button class="btn btn-next" onclick="nextCocktail()">
                Ещё коктейль
            </button>
        </div>
    </div>

    <!-- ===== ЭКРАН 5: ПОРАЖЕНИЕ ===== -->
    <div id="screen-lose" class="screen">
        <div class="barman-illustration">
            <img class="barman-img barman-img--active" src="assets/backgrounds/barmen pose 3.png" alt="Бармен">
        </div>
        <div class="barman-overlay">
            <div class="dialogue-box">
                <p class="barman-name">Бармен</p>
                <div id="lose-phrase" class="barman-text">«Не каждый способен понять этот бар. Может, в следующий раз.»</div>
            </div>
            <button class="btn btn-retry" id="btn-retry" onclick="retryCocktail()">Попробовать снова</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
